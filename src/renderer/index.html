<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RH Electron Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Electron Client</p>
        <h1>RH Electron Client</h1>
        <p class="subtitle">
          基于 Electron Forge 的桌面客户端骨架，已完成主进程、预加载脚本和渲染层分离。
        </p>
      </section>
      <section class="status-card">
        <h2>Runtime</h2>
        <p id="runtime-info">正在读取运行时信息...</p>
        <p id="ping-result">正在测试进程通信...</p>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
