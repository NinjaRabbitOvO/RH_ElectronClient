<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RH Electron Client - Filetransfer</title>
    <link rel="stylesheet" href="./shell.css" />
  </head>
  <body data-current-page="filetransfer">
    <main class="app-shell">
      <section class="page is-active">
        <section class="surface preflight-card">
          <div class="preflight-main">
            <p class="eyebrow">Ready Check</p>
            <h2>Filetransfer</h2>
            <p class="preflight-copy">
              <span class="preflight-copy-line">&#x5728;&#x5F00;&#x59CB;&#x6587;&#x4EF6;&#x4F20;&#x8F93;&#x4E4B;&#x524D;&#xFF0C;</span>
              <span class="preflight-copy-line">&#x8BF7;&#x786E;&#x4FDD;&#x901A;&#x8FC7; WiFi &#x8FDE;&#x63A5;&#x5230;&#x9644;&#x8FD1;&#x8BBE;&#x5907;&#x3002;</span>
            </p>
            <a class="confirm-button" href="./filetransfer-content.html">
              &#x786E;&#x8BA4;
            </a>
          </div>

          <aside class="wifi-ready-pane" aria-live="polite">
            <div id="wifi-ready-list" class="wifi-ready-list">
              <button
                id="wifi-ready-button"
                class="wifi-ready-button is-scanning"
                type="button"
                aria-expanded="false"
              >
                <span class="wifi-ready-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M2.2 8.8a15.3 15.3 0 0 1 19.6 0" />
                    <path d="M5.9 12.5a10 10 0 0 1 12.2 0" />
                    <path d="M9.6 16.2a4.7 4.7 0 0 1 4.8 0" />
                    <circle cx="12" cy="19.3" r="1.3" />
                  </svg>
                </span>
                <span id="wifi-ready-label">Scanning Wi-Fi...</span>
              </button>
            </div>

            <form id="wifi-connect-form" class="wifi-connect-form" hidden>
              <label class="wifi-connect-label" for="wifi-password-input">Wi-Fi Password</label>
              <input
                id="wifi-password-input"
                class="wifi-connect-input"
                type="password"
                autocomplete="current-password"
                placeholder="Enter password (or leave blank for saved profile)"
              />
              <div class="wifi-connect-actions">
                <button id="wifi-connect-submit" class="wifi-connect-submit" type="submit">
                  Connect
                </button>
                <button
                  id="wifi-connect-saved"
                  class="wifi-connect-saved"
                  type="button"
                >
                  Use Saved
                </button>
              </div>
            </form>

            <p id="wifi-ready-status" class="wifi-ready-status">
              Scanning for nearby ESP-* networks...
            </p>
          </aside>
        </section>
      </section>
    </main>

    <nav class="floating-nav" aria-label="Primary navigation">
      <a class="nav-button" href="./shell.html" data-page-link="home" title="Home">
        <span class="nav-icon">H</span>
        <span class="nav-text">Home</span>
      </a>
      <a
        class="nav-button"
        href="./filetransfer.html"
        data-page-link="filetransfer"
        title="Filetransfer"
      >
        <span class="nav-icon">F</span>
        <span class="nav-text">File</span>
      </a>
      <a class="nav-button" href="./info.html" data-page-link="info" title="Info">
        <span class="nav-icon">I</span>
        <span class="nav-text">Info</span>
      </a>
    </nav>

    <script src="./shell.js"></script>
  </body>
</html>
