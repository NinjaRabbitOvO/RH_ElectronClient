<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self' https:; child-src 'self' https:; frame-src 'self' https:"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self' https:; child-src 'self' https:; frame-src 'self' https:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RH Electron Client</title>
    <link rel="stylesheet" href="./shell.css" />
  </head>
  <body data-current-page="home">
    <main class="app-shell">
      <section class="page is-active">
        <webview
          id="home-webview"
          class="home-webview"
          src="https://encortec.iotomp.com"
          partition="persist:home-remote"
        ></webview>
      </section>

      <section class="page" data-page="filetransfer">
        <div class="page-head">
          <div>
            <p class="eyebrow" data-i18n="shell.pageEyebrow">Page</p>
            <h2 data-i18n="shell.pageFile">Filetransfer</h2>
          </div>
        </div>
        <div class="surface placeholder-surface">
          <p class="placeholder-label" data-i18n="shell.placeholderFile">filetransfer</p>
        </div>
      </section>

      <section class="page" data-page="info">
        <div class="page-head">
          <div>
            <p class="eyebrow" data-i18n="shell.pageEyebrow">Page</p>
            <h2 data-i18n="shell.pageInfo">Info</h2>
          </div>
        </div>
        <div class="surface placeholder-surface">
          <p class="placeholder-label" data-i18n="shell.placeholderInfo">info</p>
        </div>
      </section>
    </main>

    <nav class="floating-nav" aria-label="Primary navigation">
      <a class="nav-button" href="./shell.html" data-page-link="home" title="Home" data-i18n-title="nav.home">
        <span class="nav-icon">H</span>
        <span class="nav-text" data-i18n="nav.home">Home</span>
      </a>
      <a
        class="nav-button"
        href="./filetransfer.html"
        data-page-link="filetransfer"
        title="Filetransfer"
        data-i18n-title="nav.file"
      >
        <span class="nav-icon">F</span>
        <span class="nav-text" data-i18n="nav.file">File</span>
      </a>
      <a class="nav-button" href="./info.html" data-page-link="info" title="Info" data-i18n-title="nav.info">
        <span class="nav-icon">I</span>
        <span class="nav-text" data-i18n="nav.info">Info</span>
      </a>
      <button id="language-toggle" class="nav-button nav-language-button" type="button" title="Switch language">
        <span id="language-toggle-icon" class="nav-icon">EN</span>
        <span id="language-toggle-text" class="nav-text">中文</span>
      </button>
    </nav>

    <script src="./shell.js"></script>
  </body>
</html>
